function GraphEdge({ edge, nodes, visible }) {
  const from = nodes.find(n => n.id === edge.from);
  const to = nodes.find(n => n.id === edge.to);
  if (!from || !to) return null;
  const dx = to.x - from.x, dy = to.y - from.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const fromSize = from.type === 'dc' ? 36 : from.type === 'server' ? 30 : from.type === 'user' ? 22 : 26;
  const toSize = to.type === 'dc' ? 36 : to.type === 'server' ? 30 : to.type === 'user' ? 22 : 26;
  const ux = dx/dist, uy = dy/dist;
  const x1 = from.x + ux * (fromSize + 2), y1 = from.y + uy * (fromSize + 2);
  const x2 = to.x - ux * (toSize + 2), y2 = to.y - uy * (toSize + 2);
  const mx = (x1 + x2) / 2 + (dy / dist) * 30;
  const my = (y1 + y2) / 2 - (dx / dist) * 30;

  const labelParts = edge.label.split('\n');
  const lx = (x1 + x2) / 2 + (dy / dist) * 44;
  const ly = (y1 + y2) / 2 - (dx / dist) * 44;

  return (
    <g opacity={visible ? 1 : 0.15} style={{ transition: 'opacity 0.4s' }}>
      <path d={`M${x1},${y1} Q${mx},${my} ${x2},${y2}`}
        fill="none" stroke={edge.color || '#4b5563'} strokeWidth="1.5"
        strokeDasharray={edge.dashed ? '5 4' : 'none'}
        markerEnd="url(#arrow)"
      />
      {edge.label && (
        <g>
          <rect x={lx - 38} y={ly - 11} width="76" height={labelParts.length > 1 ? 24 : 14} rx="3" fill="var(--bg-base)" opacity="0.85"/>
          {labelParts.map((p, i) => (
            <text key={i} x={lx} y={ly - 3 + i * 12} textAnchor="middle" fontSize="8.5" fill={edge.color || '#9ca3af'} fontFamily="var(--font-mono)" fontWeight="600">{p}</text>
          ))}
        </g>
      )}
    </g>
  );
}

function QueryPage() {
  const [messages, setMessages] = useState([

  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollTop = bottomRef.current.scrollHeight;
  }, [messages]);

  const sendMessage = async (text) => {
    const q = text || input.trim();
    if (!q || loading) return;
    setInput('');
    setMessages(prev => [...prev, { role: 'user', content: q }]);
    setLoading(true);

    setMessages(prev => [...prev, { role: 'assistant', content: '', thinking: true, sources: [], confidence: null }]);

    await new Promise(r => setTimeout(r, 1400));

    const canned = CANNED_RESPONSES[q];
    let response;
    if (canned) {
      response = { role: 'assistant', content: canned.answer, sources: canned.sources, confidence: canned.confidence, cypher: canned.cypher, thinking: false };

      const prompt = `You are RAPTOR, a forensic APT analyst AI. The active investigation is INV-0047 "Operation Shadow Broker" with APT29 attributed at 74% confidence. Answer this analyst question concisely and technically: "${q}". Focus on actionable insights. Reference specific MITRE ATT&CK technique IDs where relevant.`;

        answer = 'Unable to reach LLM endpoint. Ensure Claude API is configured in Settings > Model Configuration.';
      }
      response = { role: 'assistant', content: answer, sources: [{ title: 'RAG Context — INV-0047', id: 'internal', confidence: 'medium' }], confidence: 'medium', thinking: false };

    setMessages(prev => [...prev.slice(0, -1), response]);

        ))}
        <span style={{ marginLeft: 'auto', fontSize: 11, color: 'var(--text-muted)', fontFamily: 'var(--font-mono)' }}>Model: claude-sonnet-4-5 | RAG: ON | Reranker: bge-large</span>
      </div>

      {/* Messages */}
      <div ref={bottomRef} style={{ flex: 1, overflowY: 'auto', padding: '24px 24px 8px' }}>
        {messages.map((m, i) => <QueryMessage key={i} msg={m} />)}
        {loading && messages[messages.length - 1]?.thinking && (
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', padding: '0 0 16px 42px' }}>
            {[0,1,2].map(i => (
              <div key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--accent)', animation: `bounce 1.2s ease ${i * 0.2}s infinite` }} />
            ))}
            <span style={{ fontSize: 11, color: 'var(--text-muted)', fontFamily: 'var(--font-mono)', marginLeft: 8 }}>Retrieving from RAG pipeline...</span>
          </div>
        )}
      </div>

      {/* Example queries */}
      <div style={{ padding: '8px 24px', borderTop: '1px solid var(--border-subtle)', display: 'flex', gap: 6, overflowX: 'auto', flexWrap: 'nowrap' }}>
        {EXAMPLE_QUERIES.slice(0, 4).map(q => (
          <button key={q} onClick={() => sendMessage(q)} style={{
            padding: '5px 12px', borderRadius: 16, border: '1px solid var(--border)',
            background: 'var(--bg-elevated)', color: 'var(--text-muted)', fontSize: 11,
            cursor: 'pointer', whiteSpace: 'nowrap', fontFamily: 'var(--font-ui)',
            transition: 'all 0.15s', flexShrink: 0,
          }}

            {q}
          </button>
        ))}
      </div>

      {/* Input */}
      <div style={{ padding: '12px 24px 20px', borderTop: '1px solid var(--border)' }}>
        <div style={{ display: 'flex', gap: 10, background: 'var(--bg-surface)', border: '1px solid var(--border-bright)', borderRadius: 10, padding: '4px 4px 4px 16px', transition: 'border-color 0.15s' }}>
          <input value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && !e.shiftKey && sendMessage()}
            placeholder="Ask anything about this campaign... (Enter to send)"
            style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: 'var(--text-primary)', fontSize: 13, fontFamily: 'var(--font-ui)', padding: '8px 0' }} />
          <button onClick={() => sendMessage()} disabled={!input.trim() || loading} style={{
            padding: '8px 18px', borderRadius: 7, border: 'none',
            background: input.trim() && !loading ? 'var(--accent)' : 'var(--bg-elevated)',
            color: input.trim() && !loading ? '#fff' : 'var(--text-muted)',
            fontSize: 13, fontWeight: 600, cursor: input.trim() && !loading ? 'pointer' : 'default',
            fontFamily: 'var(--font-ui)', transition: 'all 0.15s',
          }}>Send</button>
        </div>
      </div>
    </div>
  );

              <div key={t} style={{ width: 100, padding: '8px 6px', background: 'var(--bg-elevated)', borderRadius: '6px 6px 0 0', textAlign: 'center', fontSize: 10, fontWeight: 700, fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)', letterSpacing: '0.02em', border: '1px solid var(--border)', borderBottom: 'none' }}>{t}</div>
            ))}
          </div>
          {rows.map((row, ri) => (
            <div key={ri} style={{ display: 'flex', gap: 3, marginBottom: 3 }}>
              {row.map((tid, ci) => {
                const hit = tid && detected.includes(tid);
                return (
                  <div key={ci} style={{
                    width: 100, height: 36, borderRadius: ri === rows.length - 1 ? '0 0 6px 6px' : 0,
                    background: hit ? 'rgba(239,68,68,0.2)' : tid ? 'var(--bg-elevated)' : 'var(--bg-base)',
                    border: `1px solid ${hit ? 'var(--danger)' : 'var(--border)'}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    cursor: tid ? 'pointer' : 'default',
                    transition: 'all 0.12s',
                  }}
                  onMouseEnter={e => { if (tid) e.currentTarget.style.background = hit ? 'rgba(239,68,68,0.3)' : 'var(--bg-overlay)'; }}
                  onMouseLeave={e => { if (tid) e.currentTarget.style.background = hit ? 'rgba(239,68,68,0.2)' : 'var(--bg-elevated)'; }}>
                    {tid && <span style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: hit ? 'var(--danger)' : 'var(--text-muted)', fontWeight: hit ? 700 : 400 }}>{tid}</span>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      <div style={{ marginTop: 16, display: 'flex', gap: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 14, height: 14, borderRadius: 3, background: 'rgba(239,68,68,0.2)', border: '1px solid var(--danger)' }} />
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Detected in INV-0047 ({detected.length} techniques)</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <div style={{ width: 14, height: 14, borderRadius: 3, background: 'var(--bg-elevated)', border: '1px solid var(--border)' }} />
          <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>Known ATT&CK technique</span>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [currentPage, setCurrentPage] = useState('dashboard');
  const [currentInvestigation, setCurrentInvestigation] = useState(null);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const navigate = (page, data) => {
    setCurrentPage(page);
    if (data) setCurrentInvestigation(data);
    else if (page !== 'investigation-detail') setCurrentInvestigation(null);
  };

  const renderPage = () => {
    switch (currentPage) {
      case 'dashboard':           return <DashboardPage navigate={navigate} />;
      case 'investigations':      return <InvestigationsPage navigate={navigate} />;
      case 'new-investigation':   return <NewInvestigationPage navigate={navigate} />;
      case 'investigation-detail':return <InvestigationDetailPage investigation={currentInvestigation} navigate={navigate} />;
      case 'attack-graph':        return <InvestigationDetailPage investigation={null} navigate={navigate} defaultTab="graph" />;
      case 'apt-library':         return <APTLibraryPage />;
      case 'query':               return <QueryPage />;
      case 'threat-feeds':        return <ThreatFeedsPage />;
      case 'simulation':          return <InvestigationDetailPage investigation={null} navigate={navigate} defaultTab="simulation" />;
      case 'mitre-navigator':     return <MitreNavigatorPage />;
      case 'reports':             return <ReportsPage navigate={navigate} />;
      case 'settings':            return <SettingsPage />;
      default:                    return <DashboardPage navigate={navigate} />;
    }
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: 'var(--bg-base)' }}>
      <Sidebar currentPage={currentPage} navigate={navigate} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
        <TopBar currentPage={currentPage} navigate={navigate} />
        <div key={currentPage} className="page-enter" style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          {renderPage()}
        </div>
      </div>
      <TweaksPanel visible={tweaksVisible} onClose={() => { setTweaksVisible(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
