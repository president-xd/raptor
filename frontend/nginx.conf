# ── Rate-limit zones ─────────────────────────────────────────────────────────
# Separate zones so auth hammering doesn't crowd out normal API traffic.
limit_req_zone $binary_remote_addr zone=raptor_auth:10m  rate=2r/s;
limit_req_zone $binary_remote_addr zone=raptor_api:20m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=raptor_upload:5m rate=1r/s;

limit_req_status 429;

server {
  listen 3100;
  server_name _;

  server_tokens off;
  client_max_body_size 12m;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header X-Content-Type-Options    "nosniff"                                       always;
  add_header X-Frame-Options           "DENY"                                          always;
  add_header Referrer-Policy           "no-referrer"                                   always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;
  add_header Content-Security-Policy
    "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    always;
  add_header X-Permitted-Cross-Domain-Policies "none"                           always;
  # HSTS — 1 year, include subdomains, preload list eligible.
  # Only effective when served over TLS (behind a TLS-terminating ingress).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  # Prevent browsers from caching API responses
  add_header Cache-Control             "no-store"                                      always;

  root  /usr/share/nginx/html;
  index index.html;

  # ── Auth endpoint: strict rate limit ──────────────────────────────────────
  location = /api/v1/auth/session {
    limit_req zone=raptor_auth burst=5 nodelay;
    proxy_pass http://backend:8000/api/v1/auth/session;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── Upload endpoints: slower rate limit ───────────────────────────────────
  location ~ ^/api/v1/investigate(/text)?$ {
    limit_req zone=raptor_upload burst=3 nodelay;
    proxy_pass http://backend:8000$request_uri;
    proxy_http_version  1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout   60s;
    proxy_read_timeout  120s;
    proxy_buffering     off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── General API: standard rate limit ──────────────────────────────────────
  location /api/ {
    limit_req zone=raptor_api burst=40 nodelay;
    proxy_pass http://backend:8000/api/;
    proxy_http_version  1.1;
    proxy_connect_timeout  5s;
    proxy_send_timeout    60s;
    proxy_read_timeout   120s;
    proxy_buffering       off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
