services:
  # ─── Infrastructure Services ────────────────────────────────────────

  neo4j:
    image: neo4j:5.15-community
    container_name: raptor-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_me_neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:7474:7474"
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  weaviate:
    image: semitechnologies/weaviate:1.27.6
    container_name: raptor-weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:8080:8080"
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:50051:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: raptor-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.2-alpine
    container_name: raptor-redis
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # ─── Application Services ──────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: raptor-backend
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-change_me_neo4j_password}
      - WEAVIATE_URL=http://weaviate:8080
      - WEAVIATE_GRPC_URL=weaviate:50051
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: raptor-frontend
    ports:
      - "${LOCAL_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3100}:3100"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=755
      - /var/run:uid=101,gid=101,mode=755

volumes:
  neo4j_data:
  weaviate_data:
  elastic_data:
  redis_data:
