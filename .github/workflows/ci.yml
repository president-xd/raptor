name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.lock
          pip install pytest
          pip check

      - name: Run backend tests
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npx playwright install --with-deps chromium
          npm run e2e

      - name: Validate production compose overlay
        env:
          RAPTOR_API_KEY: ci_raptor_api_key_with_enough_entropy
          RAPTOR_BOOTSTRAP_ADMIN_PASSWORD: ci_bootstrap_admin_password_with_enough_entropy
          EVIDENCE_ENCRYPTION_KEY: ci_evidence_key_with_enough_entropy_32_bytes
          NEO4J_PASSWORD: ci_neo4j_password_with_enough_entropy
          WEAVIATE_API_KEY: ci_weaviate_api_key_with_enough_entropy
          ELASTIC_PASSWORD: ci_elastic_password_with_enough_entropy
          POSTGRES_PASSWORD: ci_postgres_password_with_enough_entropy
          RAPTOR_FRONTEND_ORIGIN: https://raptor.example.invalid
          RAPTOR_RATE_LIMIT_BACKEND: redis
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Python dependency vulnerability scan
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.lock --progress-spinner off

      - name: Frontend dependency vulnerability scan
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Secret scan
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --no-git

      - name: Filesystem vulnerability and config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  container-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # required for Cosign keyless signing
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          tags: raptor-backend:ci
          load: true

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: raptor-backend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Sign backend image (keyless OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' raptor-backend:ci 2>/dev/null || echo "raptor-backend:ci")
          cosign sign --yes "${IMAGE_DIGEST}"

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          tags: raptor-frontend:ci
          load: true

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: raptor-frontend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Sign frontend image (keyless OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' raptor-frontend:ci 2>/dev/null || echo "raptor-frontend:ci")
          cosign sign --yes "${IMAGE_DIGEST}"

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: raptor
          POSTGRES_USER: raptor
          POSTGRES_PASSWORD: raptor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raptor -d raptor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.lock
          pip install pytest
          pip check

      - name: Run PostgreSQL runtime metadata integration test
        env:
          RAPTOR_DB_ENGINE: postgresql
          RAPTOR_DATABASE_URL: postgresql://raptor:raptor@localhost:5432/raptor
          RAPTOR_API_KEY: ci_raptor_api_key_with_enough_entropy
          RAPTOR_ALLOW_AUTH_DISABLED: "false"
          RAPTOR_BOOTSTRAP_ADMIN_PASSWORD: ci_bootstrap_admin_password_with_enough_entropy
          EVIDENCE_ENCRYPTION_KEY: ci_evidence_key_with_enough_entropy_32_bytes
          NEO4J_PASSWORD: ci_neo4j_password_with_enough_entropy
          CORS_ALLOW_ORIGINS: http://localhost:3100
        run: pytest -q tests/test_postgres_runtime_integration.py
